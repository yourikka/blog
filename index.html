<!doctype html>
<html lang="zh-CN" data-theme="light">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>笔记本</title>
    <meta name="description" content="一个简洁的个人博客。">
    <meta name="theme-color" content="#f6f1e6">
    <link rel="alternate" type="application/rss+xml" title="笔记本订阅源" href="rss.xml">
    <link rel="stylesheet" href="assets/styles.css">
    <script>
      (() => {
        try {
          const stored = localStorage.getItem("theme");
          const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          document.documentElement.dataset.theme = stored || (prefersDark ? "dark" : "light");
        } catch {
          document.documentElement.dataset.theme = "light";
        }
      })();
    </script>
  </head>
  <body>
    <a class="skip-link" href="#main">跳到正文</a>
    <div class="page-shell">
      <header class="masthead">
        <a class="site-title" href="./">笔记本</a>
        <nav class="site-nav" aria-label="主导航">
          <a class="active" aria-current="page" href="./">首页</a>
          <a href="posts/">文章</a>
          <a href="showcase/">作品</a>
          <a href="about/">关于</a>
        </nav>
        <button class="theme-switch" id="theme-toggle" type="button" aria-label="切换主题">主题</button>
      </header>

      <main id="main">
        <section class="intro-block">
          <p class="kicker">个人博客模板</p>
          <p class="intro-copy">个人信息和文章内容暂时留空，准备好后可以替换这段简介。</p>
        </section>

        <section class="index-grid" aria-label="站点栏目">
          <a class="index-card" href="posts/">
            <span class="card-label">01</span>
            <strong>文章</strong>
            <span>还没有发布文章。</span>
          </a>
          <a class="index-card" href="showcase/">
            <span class="card-label">02</span>
            <strong>作品</strong>
            <span>项目和链接会放在这里。</span>
          </a>
          <a class="index-card" href="about/">
            <span class="card-label">03</span>
            <strong>关于</strong>
            <span>个人资料尚未填写。</span>
          </a>
        </section>

        <section class="section-block" aria-labelledby="recent-title">
          <div class="section-heading">
            <h2 id="recent-title">最近</h2>
            <a href="posts/">归档</a>
          </div>
          <div class="empty-line">
            <span>0000-00-00</span>
            <p>还没有文章。可以复制 <code>templates/post.html</code> 到 <code>posts/post-slug/index.html</code> 开始写作。</p>
          </div>
        </section>
      </main>

      <footer class="site-footer">
        <span>@2026 笔记本</span>
        <a href="rss.xml">订阅</a>
      </footer>
    </div>
    <script src="assets/main.js"></script>
  </body>
</html>
