<!doctype html>
<html lang="zh-CN" data-theme="light">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>文章标题 - 笔记本</title>
    <meta name="description" content="文章摘要。">
    <meta name="theme-color" content="#f6f1e6">
    <link rel="stylesheet" href="../../assets/styles.css">
    <script>
      (() => {
        try {
          const stored = localStorage.getItem("theme");
          const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          document.documentElement.dataset.theme = stored || (prefersDark ? "dark" : "light");
        } catch {
          document.documentElement.dataset.theme = "light";
        }
      })();
    </script>
  </head>
  <body>
    <a class="skip-link" href="#main">跳到正文</a>
    <div class="page-shell">
      <header class="masthead">
        <a class="site-title" href="../../">笔记本</a>
        <nav class="site-nav" aria-label="主导航">
          <a href="../../">首页</a>
          <a class="active" aria-current="page" href="../">文章</a>
          <a href="../../showcase/">作品</a>
          <a href="../../about/">关于</a>
        </nav>
        <button class="theme-switch" id="theme-toggle" type="button" aria-label="切换主题">主题</button>
      </header>

      <main id="main">
        <a class="back-link" href="../">返回文章</a>
        <article class="article">
          <header class="article-head">
            <p class="kicker">分类</p>
            <h1>文章标题</h1>
            <p>在这里写一句文章摘要。</p>
            <time datetime="2026-06-04">2026-06-04</time>
          </header>
          <div class="article-body">
            <p>从这里开始写正文。</p>
            <h2>小标题</h2>
            <p>段落内容。</p>
          </div>
        </article>
      </main>

      <footer class="site-footer">
        <span>@2026 笔记本</span>
        <a href="../../rss.xml">订阅</a>
      </footer>
    </div>
    <script src="../../assets/main.js"></script>
  </body>
</html>
