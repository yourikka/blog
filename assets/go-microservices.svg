<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">Go 微服务系统示意图</title>
  <desc id="desc">请求经过 API 网关进入多个业务服务，服务之间通过 RPC 和消息队列协作，并各自拥有数据库。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a0522d"/>
    </marker>
    <style>
      .bg { fill: #f6f1e6; }
      .panel { fill: #fbf7ef; stroke: #d8c8ad; stroke-width: 2; }
      .box { fill: #fffaf1; stroke: #a0522d; stroke-width: 2; }
      .soft { fill: #efe2cc; stroke: #c8b48f; stroke-width: 2; }
      .db { fill: #fffaf1; stroke: #6f6254; stroke-width: 2; }
      .line { fill: none; stroke: #a0522d; stroke-width: 2.5; marker-end: url(#arrow); }
      .dash { fill: none; stroke: #6f6254; stroke-width: 2; stroke-dasharray: 7 7; marker-end: url(#arrow); }
      .title { fill: #2d2823; font: 700 28px Georgia, "Noto Serif SC", serif; }
      .label { fill: #2d2823; font: 700 19px "Noto Sans SC", Arial, sans-serif; }
      .small { fill: #6f6254; font: 14px "Noto Sans SC", Arial, sans-serif; }
      .tiny { fill: #6f6254; font: 12px "Noto Sans SC", Arial, sans-serif; }
    </style>
  </defs>
  <rect class="bg" width="960" height="520"/>
  <text class="title" x="50" y="52">一个请求在微服务系统里的流动</text>
  <text class="small" x="50" y="82">外部请求先到网关，再进入不同业务服务；服务可以同步调用，也可以通过消息队列异步协作。</text>

  <rect class="panel" x="42" y="112" width="876" height="348" rx="18"/>

  <rect class="soft" x="76" y="190" width="118" height="70" rx="10"/>
  <text class="label" x="112" y="222">用户</text>
  <text class="tiny" x="100" y="244">浏览器 / App</text>

  <rect class="box" x="256" y="178" width="136" height="94" rx="12"/>
  <text class="label" x="292" y="214">API 网关</text>
  <text class="tiny" x="286" y="239">鉴权 · 路由</text>
  <text class="tiny" x="286" y="257">限流 · 统一入口</text>

  <rect class="box" x="470" y="132" width="132" height="72" rx="12"/>
  <text class="label" x="496" y="165">订单服务</text>
  <text class="tiny" x="500" y="186">下单 / 查询</text>

  <rect class="box" x="470" y="238" width="132" height="72" rx="12"/>
  <text class="label" x="496" y="271">库存服务</text>
  <text class="tiny" x="500" y="292">预占 / 释放</text>

  <rect class="box" x="470" y="344" width="132" height="72" rx="12"/>
  <text class="label" x="496" y="377">支付服务</text>
  <text class="tiny" x="500" y="398">支付 / 回调</text>

  <rect class="soft" x="680" y="222" width="144" height="84" rx="12"/>
  <text class="label" x="710" y="256">消息队列</text>
  <text class="tiny" x="704" y="280">异步任务 / 解耦</text>

  <ellipse class="db" cx="744" cy="388" rx="74" ry="24"/>
  <path class="db" d="M670 388v44c0 13 33 24 74 24s74-11 74-24v-44"/>
  <text class="label" x="706" y="430">各自数据</text>

  <path class="line" d="M194 225h52"/>
  <path class="line" d="M392 224 C420 205 432 180 466 168"/>
  <path class="line" d="M392 224 C421 235 434 264 466 274"/>
  <path class="line" d="M392 224 C421 282 431 358 466 380"/>
  <path class="dash" d="M602 168 C650 174 668 214 694 230"/>
  <path class="dash" d="M602 274h72"/>
  <path class="dash" d="M602 380 C648 372 671 330 714 303"/>
  <path class="line" d="M748 306v54"/>

  <rect class="soft" x="96" y="330" width="264" height="76" rx="12"/>
  <text class="label" x="122" y="362">服务治理</text>
  <text class="small" x="122" y="386">服务发现 · 负载均衡 · 超时 · 重试 · 熔断</text>
</svg>
